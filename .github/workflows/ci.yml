name: CI Payload

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 isort mypy pytest
        # Install the package itself in editable mode if it has a pyproject.toml
        if [ -f "pyproject.toml" ]; then pip install -e .; fi
        
    - name: Check code formatting with Black
      run: black --check .

    - name: Check imports sequence with isort
      run: isort --check-only .

    - name: Lint with flake8
      run: flake8 .

    - name: Type check with mypy
      run: mypy . || true  # Allowing failure temporarily until types are perfect
      
    - name: Run Pytest
      run: pytest tests/
